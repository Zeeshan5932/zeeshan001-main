<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zeeshan Younas — AI Engineer &amp; Data Scientist</title>
    <meta name="theme-color" content="#07131b" />
    <meta name="description" content="Portfolio of Zeeshan Younas, an AI Engineer and Data Scientist building production-grade AI, ML, and computer vision systems." />
    <meta name="author" content="Zeeshan Younas" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />

    <script>
      (function () {
        try {
          var storageKey = "zeeshan-portfolio-theme";
          var savedTheme = localStorage.getItem(storageKey);
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var theme = savedTheme === "light" || savedTheme === "dark" ? savedTheme : (prefersDark ? "dark" : "light");
          var root = document.documentElement;
          root.classList.toggle("dark", theme === "dark");
          root.style.colorScheme = theme;
          var themeMeta = document.querySelector('meta[name="theme-color"]');
          if (themeMeta) {
            themeMeta.setAttribute("content", theme === "dark" ? "#07131b" : "#f8fafc");
          }
        } catch (error) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Zeeshan Younas — AI Engineer &amp; Data Scientist" />
    <meta property="og:description" content="Portfolio of Zeeshan Younas, an AI Engineer and Data Scientist building production-grade AI, ML, and computer vision systems." />
    <meta property="og:image" content="/social-card.svg" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Zeeshan Younas — AI Engineer &amp; Data Scientist" />
    <meta name="twitter:description" content="Portfolio of Zeeshan Younas, an AI Engineer and Data Scientist building production-grade AI, ML, and computer vision systems." />
    <meta name="twitter:image" content="/social-card.svg" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
